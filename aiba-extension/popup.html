<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e2e8f0;
    }
    .header {
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { color: #fff; }
    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .header-text p {
      font-size: 10px;
      color: #94a3b8;
      margin-top: 2px;
    }
    .content { padding: 14px 18px 16px; }
    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .status-item:last-of-type { border-bottom: none; }
    .status-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #94a3b8;
    }
    .status-info { flex: 1; min-width: 0; }
    .status-label {
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
    }
    .status-text {
      font-size: 10px;
      color: #64748b;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
    }
    .status-dot.ok { background: #22c55e; box-shadow: 0 0 6px rgba(34, 197, 94, 0.4); }
    .status-dot.error { background: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.4); }
    .status-dot.loading { background: #f59e0b; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .actions { margin-top: 14px; display: flex; gap: 8px; }
    .action-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.04);
      color: #cbd5e1;
      transition: all 0.15s;
    }
    .action-btn:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.12); }
    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .action-btn.danger { color: #f87171; }
    .action-btn.danger:hover { background: rgba(239, 68, 68, 0.1); }
    .progress {
      margin-top: 10px;
      padding: 10px;
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.15);
      border-radius: 8px;
      font-size: 11px;
      color: #4ade80;
      text-align: center;
      display: none;
    }
    .progress.error { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.15); color: #f87171; }
    .hint {
      margin-top: 12px;
      font-size: 10px;
      color: #475569;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </div>
    <div class="header-text">
      <h1>Ai-Ba Tools</h1>
      <p>会議サポートツール</p>
    </div>
  </div>
  <div class="content">
    <div class="status-item">
      <div class="status-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </div>
      <div class="status-info">
        <div class="status-label">タブ音声</div>
        <div class="status-text" id="textCapture">確認中...</div>
      </div>
      <div class="status-dot" id="dotCapture"></div>
    </div>
    <div class="status-item">
      <div class="status-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </div>
      <div class="status-info">
        <div class="status-label">Ai-Ba 連携</div>
        <div class="status-text" id="textAuth">確認中...</div>
      </div>
      <div class="status-dot" id="dotAuth"></div>
    </div>
    <div id="progress" class="progress"></div>
    <div class="actions">
      <button class="action-btn" id="btnRetry">再セットアップ</button>
      <button class="action-btn danger" id="btnStop" disabled>停止</button>
    </div>
    <div class="hint">
      会議ページで拡張アイコンをクリックすると<br>
      タブ音声キャプチャと Ai-Ba 連携を自動実行します
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
