<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #1f2937;
    }
    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 16px;
      color: #fff;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header p {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 4px;
    }
    .content {
      padding: 16px;
    }
    .step {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .step-num {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #4f46e5;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .step-text {
      font-size: 12px;
      line-height: 1.5;
      color: #374151;
    }
    .step-text strong {
      color: #4f46e5;
    }
    .supported {
      margin-top: 12px;
      padding: 10px;
      background: #eff6ff;
      border-radius: 8px;
      font-size: 11px;
      color: #1e40af;
    }
    .supported span {
      display: inline-block;
      background: #dbeafe;
      padding: 2px 6px;
      border-radius: 4px;
      margin: 2px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>&#x1F3AD; Ai-Ba Virtual Camera</h1>
    <p>Live2D キャラクターを会議のカメラとして使用</p>
  </div>
  <div class="content">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">
        Ai-Ba アプリで<strong>スタジオ &gt; 仮想カメラ</strong>を開き、フェイストラッキングを開始
      </div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">
        Meet / Zoom ページ右下の<strong>「Ai-Ba Camera」ボタン</strong>をクリック
      </div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">
        タブ選択画面で <strong>Ai-Ba Studio Camera</strong> タブを選択
      </div>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <div class="step-text">
        会議に参加すると、キャラクターがカメラ映像として表示されます
      </div>
    </div>
    <div class="supported">
      対応サービス:
      <span>Google Meet</span>
      <span>Zoom (Web)</span>
      <span>YouTube Live</span>
    </div>
  </div>
</body>
</html>
