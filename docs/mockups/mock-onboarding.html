<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ai-Ba Onboarding</title>
<style>
  :root {
    --blue-50: #EFF6FF;
    --blue-100: #DBEAFE;
    --blue-200: #BFDBFE;
    --blue-300: #93C5FD;
    --blue-400: #60A5FA;
    --blue-500: #3B82F6;
    --blue-600: #2563EB;
    --blue-700: #1D4ED8;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-400: #9CA3AF;
    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-800: #1F2937;
    --gray-900: #111827;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --radius-full: 9999px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --transition-fast: 150ms ease;
    --transition-normal: 300ms ease;
    --transition-slow: 500ms ease;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--gray-100);
    color: var(--gray-800);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .phone-frame {
    width: 390px;
    max-width: 100vw;
    height: 100dvh;
    max-height: 844px;
    background: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }

  @media (max-width: 420px) {
    .phone-frame {
      max-height: 100dvh;
      border-radius: 0;
    }
  }

  @media (min-width: 421px) {
    .phone-frame {
      border-radius: 32px;
    }
  }

  /* ===== Progress Bar ===== */
  .progress-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--gray-100);
    z-index: 100;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue-400), var(--blue-600));
    transition: width 400ms cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 0 2px 2px 0;
    width: 0%;
  }

  /* ===== Back Button ===== */
  .back-btn {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 101;
    width: 40px;
    height: 40px;
    border: none;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    border-radius: var(--radius-full);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform var(--transition-fast), box-shadow var(--transition-fast), opacity var(--transition-normal);
    box-shadow: var(--shadow-sm);
    opacity: 0;
    pointer-events: none;
  }

  .back-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .back-btn:active {
    transform: scale(0.92);
  }

  .back-btn svg {
    width: 20px;
    height: 20px;
    stroke: var(--gray-600);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ===== Steps Container ===== */
  .steps-container {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .step {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 60px 28px 32px;
    opacity: 0;
    transform: translateX(80px);
    pointer-events: none;
    transition: opacity 350ms ease, transform 350ms cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .step.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  .step.exit-left {
    opacity: 0;
    transform: translateX(-80px);
    pointer-events: none;
  }

  .step.enter-right {
    opacity: 0;
    transform: translateX(80px);
    pointer-events: none;
  }

  /* ===== Step 0: Welcome ===== */
  .step-welcome {
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 32px 28px;
    background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 40%, #BFDBFE 100%);
    background-size: 200% 200%;
    animation: gradientShift 8s ease infinite;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .welcome-logo {
    margin-bottom: 12px;
    opacity: 0;
    transform: scale(0.8);
    animation: logoReveal 800ms cubic-bezier(0.34, 1.56, 0.64, 1) 300ms forwards;
  }

  @keyframes logoReveal {
    to { opacity: 1; transform: scale(1); }
  }

  .welcome-logo-text {
    font-size: 56px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }

  .welcome-logo-sub {
    font-size: 15px;
    color: var(--blue-500);
    font-weight: 500;
    letter-spacing: 4px;
    margin-top: 2px;
  }

  .welcome-tagline {
    font-size: 20px;
    font-weight: 600;
    color: var(--gray-700);
    margin-top: 24px;
    opacity: 0;
    animation: fadeUp 600ms ease 700ms forwards;
    line-height: 1.6;
  }

  .welcome-desc {
    font-size: 14px;
    color: var(--gray-500);
    margin-top: 12px;
    opacity: 0;
    animation: fadeUp 600ms ease 900ms forwards;
    line-height: 1.7;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-start-btn {
    margin-top: 48px;
    opacity: 0;
    animation: fadeUp 600ms ease 1100ms forwards;
  }

  .welcome-start-btn button {
    padding: 16px 56px;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-600));
    border: none;
    border-radius: var(--radius-full);
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(59,130,246,0.35);
    transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    position: relative;
    overflow: hidden;
    font-family: inherit;
  }

  .welcome-start-btn button::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: inherit;
    background: linear-gradient(135deg, var(--blue-400), var(--blue-600));
    opacity: 0;
    z-index: -1;
    animation: pulse-ring 2s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0; }
    50% { transform: scale(1.06); opacity: 0.3; }
  }

  .welcome-start-btn button:active {
    transform: scale(0.96);
    box-shadow: 0 2px 8px rgba(59,130,246,0.3);
  }

  /* ===== Common Form Styles ===== */
  .step-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--gray-800);
    line-height: 1.5;
  }

  .step-subtitle {
    font-size: 14px;
    color: var(--gray-400);
    margin-top: 6px;
    line-height: 1.6;
  }

  .form-section {
    margin-top: 32px;
  }

  .form-section + .form-section {
    margin-top: 24px;
  }

  .form-section:first-of-type {
    margin-top: 24px;
  }

  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-500);
    margin-bottom: 10px;
    display: block;
  }

  /* ===== Floating Input ===== */
  .floating-input-wrap {
    position: relative;
    margin-top: 28px;
  }

  .floating-input {
    width: 100%;
    padding: 18px 16px 8px;
    font-size: 17px;
    font-weight: 500;
    border: 2px solid var(--gray-200);
    border-radius: var(--radius-md);
    background: var(--gray-50);
    color: var(--gray-800);
    outline: none;
    transition: border-color var(--transition-normal), box-shadow var(--transition-normal), background var(--transition-normal);
    font-family: inherit;
  }

  .floating-input:focus {
    border-color: var(--blue-400);
    box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
    background: #fff;
  }

  .floating-input::placeholder {
    color: transparent;
  }

  .floating-label {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: var(--gray-400);
    pointer-events: none;
    transition: all 200ms ease;
  }

  .floating-input:focus ~ .floating-label,
  .floating-input:not(:placeholder-shown) ~ .floating-label {
    top: 10px;
    transform: translateY(0);
    font-size: 11px;
    color: var(--blue-500);
    font-weight: 600;
  }

  /* ===== Pill Buttons ===== */
  .pill-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
  }

  .pill-btn {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    border: 2px solid var(--gray-200);
    border-radius: var(--radius-full);
    background: #fff;
    color: var(--gray-600);
    cursor: pointer;
    transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none;
    position: relative;
    overflow: hidden;
    font-family: inherit;
  }

  .pill-btn:active {
    transform: scale(0.95);
  }

  .pill-btn.selected {
    border-color: var(--blue-500);
    background: var(--blue-50);
    color: var(--blue-600);
    font-weight: 600;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    animation: popIn 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    0% { transform: scale(0.9); }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  /* ===== Tone Cards ===== */
  .tone-cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 8px;
  }

  .tone-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    border: 2px solid var(--gray-200);
    border-radius: var(--radius-lg);
    background: #fff;
    cursor: pointer;
    transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none;
  }

  .tone-card:active {
    transform: scale(0.98);
  }

  .tone-card.selected {
    border-color: var(--blue-500);
    background: var(--blue-50);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    animation: popIn 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .tone-card-emoji {
    font-size: 28px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--gray-50);
    border-radius: var(--radius-md);
    flex-shrink: 0;
    transition: background var(--transition-fast);
  }

  .tone-card.selected .tone-card-emoji {
    background: var(--blue-100);
  }

  .tone-card-text {
    flex: 1;
  }

  .tone-card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-800);
  }

  .tone-card-desc {
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 2px;
  }

  .tone-card-check {
    width: 22px;
    height: 22px;
    border: 2px solid var(--gray-300);
    border-radius: var(--radius-full);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 200ms ease;
  }

  .tone-card.selected .tone-card-check {
    border-color: var(--blue-500);
    background: var(--blue-500);
  }

  .tone-card-check svg {
    width: 14px;
    height: 14px;
    stroke: #fff;
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transform: scale(0.5);
    transition: all 200ms ease;
  }

  .tone-card.selected .tone-card-check svg {
    opacity: 1;
    transform: scale(1);
  }

  /* ===== Chip Scroll ===== */
  .chip-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-top: 8px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  .chip-scroll::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-full);
    background: #fff;
    color: var(--gray-600);
    cursor: pointer;
    transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
    user-select: none;
    font-family: inherit;
  }

  .chip:active { transform: scale(0.95); }

  .chip.selected {
    border-color: var(--blue-500);
    background: var(--blue-50);
    color: var(--blue-600);
    font-weight: 600;
    animation: popIn 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ===== Tag Grid ===== */
  .tag-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .tag {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-full);
    background: #fff;
    color: var(--gray-600);
    cursor: pointer;
    transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none;
    font-family: inherit;
  }

  .tag:active { transform: scale(0.95); }

  .tag.selected {
    border-color: var(--blue-500);
    background: var(--blue-500);
    color: #fff;
    font-weight: 600;
    animation: popIn 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .tag.disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .tag-hint {
    font-size: 12px;
    color: var(--gray-400);
    margin-left: 4px;
  }

  /* ===== Icon Cards (lifestyle) ===== */
  .icon-cards {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  .icon-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 18px 8px;
    border: 2px solid var(--gray-200);
    border-radius: var(--radius-lg);
    background: #fff;
    cursor: pointer;
    transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none;
  }

  .icon-card:active { transform: scale(0.96); }

  .icon-card.selected {
    border-color: var(--blue-500);
    background: var(--blue-50);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    animation: popIn 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .icon-card-icon {
    font-size: 28px;
  }

  .icon-card-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-600);
  }

  .icon-card.selected .icon-card-label {
    color: var(--blue-600);
  }

  /* ===== Next / Action Buttons ===== */
  .step-actions {
    margin-top: auto;
    padding-top: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn-primary {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-600));
    border: none;
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: transform var(--transition-fast), box-shadow var(--transition-fast), opacity var(--transition-fast);
    box-shadow: 0 4px 14px rgba(59,130,246,0.3);
    font-family: inherit;
  }

  .btn-primary:active {
    transform: scale(0.98);
    box-shadow: 0 2px 8px rgba(59,130,246,0.25);
  }

  .btn-primary:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    box-shadow: none;
  }

  .btn-secondary {
    width: 100%;
    padding: 14px;
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-400);
    background: none;
    border: none;
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: color var(--transition-fast);
    font-family: inherit;
  }

  .btn-secondary:active {
    color: var(--gray-600);
  }

  /* ===== Step 4: Completion ===== */
  .step-complete {
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 32px 28px;
  }

  .completion-check {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-400), var(--blue-600));
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    opacity: 0;
    transform: scale(0.5);
    position: relative;
  }

  .step-complete.active .completion-check {
    animation: checkReveal 600ms cubic-bezier(0.34, 1.56, 0.64, 1) 200ms forwards;
  }

  @keyframes checkReveal {
    to { opacity: 1; transform: scale(1); }
  }

  .completion-check svg {
    width: 40px;
    height: 40px;
    stroke: #fff;
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
  }

  .step-complete.active .completion-check svg {
    animation: drawCheck 500ms ease 600ms forwards;
  }

  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }

  .completion-title {
    font-size: 26px;
    font-weight: 800;
    color: var(--gray-800);
    opacity: 0;
  }

  .step-complete.active .completion-title {
    animation: fadeUp 500ms ease 800ms forwards;
  }

  .completion-subtitle {
    font-size: 15px;
    color: var(--gray-500);
    margin-top: 8px;
    opacity: 0;
    line-height: 1.6;
  }

  .step-complete.active .completion-subtitle {
    animation: fadeUp 500ms ease 1000ms forwards;
  }

  .completion-summary {
    margin-top: 32px;
    width: 100%;
    background: var(--gray-50);
    border-radius: var(--radius-lg);
    padding: 20px;
    text-align: left;
    opacity: 0;
  }

  .step-complete.active .completion-summary {
    animation: fadeUp 500ms ease 1200ms forwards;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
  }

  .summary-row + .summary-row {
    border-top: 1px solid var(--gray-200);
  }

  .summary-label {
    font-size: 13px;
    color: var(--gray-400);
    font-weight: 500;
  }

  .summary-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-800);
  }

  .completion-action {
    margin-top: 40px;
    width: 100%;
    opacity: 0;
  }

  .step-complete.active .completion-action {
    animation: fadeUp 500ms ease 1400ms forwards;
  }

  .completion-action .btn-primary {
    box-shadow: 0 4px 20px rgba(59,130,246,0.4);
    animation: gentlePulse 2s ease-in-out infinite 2s;
  }

  @keyframes gentlePulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(59,130,246,0.4); }
    50% { box-shadow: 0 6px 28px rgba(59,130,246,0.55); }
  }

  /* ===== Sparkles (CSS only) ===== */
  .sparkle-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--blue-400);
    opacity: 0;
  }

  .sparkle.active {
    animation: sparkleAnim var(--dur) ease-out var(--delay) forwards;
  }

  @keyframes sparkleAnim {
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(var(--tx), var(--ty)) scale(0);
    }
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="progress-bar" id="progressBar" style="display:none;">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>

  <button class="back-btn" id="backBtn" onclick="goBack()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <div class="steps-container" id="stepsContainer">

    <!-- Step 0: Welcome -->
    <div class="step step-welcome active" id="step0">
      <div class="welcome-logo">
        <div class="welcome-logo-text">Ai-Ba</div>
        <div class="welcome-logo-sub">A I &nbsp; P A R T N E R</div>
      </div>
      <div class="welcome-tagline">あなただけの<br>AI相棒を作ろう</div>
      <div class="welcome-desc">会話を通じて成長する、<br>世界でひとりだけのAIパートナー</div>
      <div class="welcome-start-btn">
        <button onclick="goToStep(1)">はじめる</button>
      </div>
    </div>

    <!-- Step 1: Nickname -->
    <div class="step" id="step1">
      <div class="step-title">まず、あなたのことを<br>教えてください</div>
      <div class="step-subtitle">相棒があなたを呼ぶ名前です</div>

      <div class="floating-input-wrap">
        <input type="text" class="floating-input" id="nicknameInput" placeholder=" " maxlength="20" autocomplete="off">
        <label class="floating-label">ニックネーム</label>
      </div>

      <div class="form-section">
        <div class="form-label">性別</div>
        <div class="pill-group" id="genderGroup">
          <button class="pill-btn" data-value="male" onclick="selectPill('gender', this)">男性</button>
          <button class="pill-btn" data-value="female" onclick="selectPill('gender', this)">女性</button>
          <button class="pill-btn" data-value="other" onclick="selectPill('gender', this)">その他</button>
          <button class="pill-btn" data-value="none" onclick="selectPill('gender', this)">答えない</button>
        </div>
      </div>

      <div class="step-actions">
        <button class="btn-primary" id="step1Next" disabled onclick="goToStep(2)">次へ</button>
      </div>
    </div>

    <!-- Step 2: AI Settings -->
    <div class="step" id="step2">
      <div class="step-title">相棒の名前を決めましょう</div>
      <div class="step-subtitle">いつでも変更できます</div>

      <div class="floating-input-wrap">
        <input type="text" class="floating-input" id="aiNameInput" placeholder=" " maxlength="20" autocomplete="off" value="アイバ">
        <label class="floating-label">AI の名前</label>
      </div>

      <div class="form-section">
        <div class="form-label">会話のトーン</div>
        <div class="tone-cards" id="toneGroup">
          <div class="tone-card" data-value="friendly" onclick="selectTone(this)">
            <div class="tone-card-emoji">&#x1F60A;</div>
            <div class="tone-card-text">
              <div class="tone-card-title">フレンドリー</div>
              <div class="tone-card-desc">タメ口で気軽に</div>
            </div>
            <div class="tone-card-check">
              <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
          </div>
          <div class="tone-card" data-value="polite" onclick="selectTone(this)">
            <div class="tone-card-emoji">&#x1F3A9;</div>
            <div class="tone-card-text">
              <div class="tone-card-title">丁寧</div>
              <div class="tone-card-desc">敬語で礼儀正しく</div>
            </div>
            <div class="tone-card-check">
              <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
          </div>
          <div class="tone-card" data-value="casual" onclick="selectTone(this)">
            <div class="tone-card-emoji">&#x1F31F;</div>
            <div class="tone-card-text">
              <div class="tone-card-title">カジュアル</div>
              <div class="tone-card-desc">親しみやすく自然に</div>
            </div>
            <div class="tone-card-check">
              <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
          </div>
        </div>
      </div>

      <div class="step-actions">
        <button class="btn-primary" id="step2Next" disabled onclick="goToStep(3)">次へ</button>
      </div>
    </div>

    <!-- Step 3: Optional Details -->
    <div class="step" id="step3">
      <div class="step-title">もう少し教えてください</div>
      <div class="step-subtitle">スキップもできます。後から変更可能です</div>

      <div class="form-section">
        <div class="form-label">お仕事・立場</div>
        <div class="chip-scroll" id="occupationGroup">
          <button class="chip" data-value="会社員" onclick="selectChip('occupation', this)">会社員</button>
          <button class="chip" data-value="学生" onclick="selectChip('occupation', this)">学生</button>
          <button class="chip" data-value="フリーランス" onclick="selectChip('occupation', this)">フリーランス</button>
          <button class="chip" data-value="主婦・主夫" onclick="selectChip('occupation', this)">主婦・主夫</button>
          <button class="chip" data-value="クリエイター" onclick="selectChip('occupation', this)">クリエイター</button>
          <button class="chip" data-value="エンジニア" onclick="selectChip('occupation', this)">エンジニア</button>
          <button class="chip" data-value="その他" onclick="selectChip('occupation', this)">その他</button>
        </div>
      </div>

      <div class="form-section">
        <div class="form-label">興味・関心<span class="tag-hint">（最大3つ）</span></div>
        <div class="tag-grid" id="interestsGroup">
          <button class="tag" data-value="音楽" onclick="toggleTag(this)">音楽</button>
          <button class="tag" data-value="映画・ドラマ" onclick="toggleTag(this)">映画・ドラマ</button>
          <button class="tag" data-value="ゲーム" onclick="toggleTag(this)">ゲーム</button>
          <button class="tag" data-value="読書" onclick="toggleTag(this)">読書</button>
          <button class="tag" data-value="料理" onclick="toggleTag(this)">料理</button>
          <button class="tag" data-value="スポーツ" onclick="toggleTag(this)">スポーツ</button>
          <button class="tag" data-value="旅行" onclick="toggleTag(this)">旅行</button>
          <button class="tag" data-value="テクノロジー" onclick="toggleTag(this)">テクノロジー</button>
          <button class="tag" data-value="アート" onclick="toggleTag(this)">アート</button>
          <button class="tag" data-value="ファッション" onclick="toggleTag(this)">ファッション</button>
          <button class="tag" data-value="ペット" onclick="toggleTag(this)">ペット</button>
          <button class="tag" data-value="アニメ" onclick="toggleTag(this)">アニメ</button>
        </div>
      </div>

      <div class="form-section">
        <div class="form-label">ライフスタイル</div>
        <div class="icon-cards" id="lifestyleGroup">
          <div class="icon-card" data-value="朝型" onclick="selectIconCard(this)">
            <div class="icon-card-icon">&#x2600;&#xFE0F;</div>
            <div class="icon-card-label">朝型</div>
          </div>
          <div class="icon-card" data-value="夜型" onclick="selectIconCard(this)">
            <div class="icon-card-icon">&#x1F319;</div>
            <div class="icon-card-label">夜型</div>
          </div>
          <div class="icon-card" data-value="不規則" onclick="selectIconCard(this)">
            <div class="icon-card-icon">&#x1F500;</div>
            <div class="icon-card-label">不規則</div>
          </div>
        </div>
      </div>

      <div class="step-actions">
        <button class="btn-primary" onclick="goToStep(4)">次へ</button>
        <button class="btn-secondary" onclick="goToStep(4)">スキップ</button>
      </div>
    </div>

    <!-- Step 4: Completion -->
    <div class="step step-complete" id="step4">
      <div class="sparkle-container" id="sparkleContainer"></div>
      <div class="completion-check">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="completion-title">準備完了！</div>
      <div class="completion-subtitle" id="completionSubtitle">あなたの相棒が待っています</div>
      <div class="completion-summary" id="completionSummary"></div>
      <div class="completion-action">
        <button class="btn-primary" onclick="alert('チャット画面へ遷移します')">相棒と話してみよう</button>
      </div>
    </div>

  </div>
</div>

<script>
  // ===== State =====
  const state = {
    nickname: '',
    gender: '',
    aiName: 'アイバ',
    tone: '',
    occupation: '',
    interests: [],
    lifestyle: '',
  };

  let currentStep = 0;
  const totalSteps = 4;

  // ===== Navigation =====
  function goToStep(step) {
    const prevEl = document.getElementById('step' + currentStep);
    const nextEl = document.getElementById('step' + step);
    const isForward = step > currentStep;

    // Collect data before leaving
    if (currentStep === 1) {
      state.nickname = document.getElementById('nicknameInput').value.trim();
    }
    if (currentStep === 2) {
      state.aiName = document.getElementById('aiNameInput').value.trim() || 'アイバ';
    }

    // Animate out
    prevEl.classList.remove('active');
    prevEl.classList.add(isForward ? 'exit-left' : 'enter-right');

    // Prepare next element off-screen
    nextEl.classList.remove('exit-left', 'enter-right', 'active');
    nextEl.style.transition = 'none';
    nextEl.classList.add(isForward ? 'enter-right' : 'exit-left');

    // Force reflow then animate in
    void nextEl.offsetWidth;
    nextEl.style.transition = '';

    requestAnimationFrame(function() {
      nextEl.classList.remove('exit-left', 'enter-right');
      nextEl.classList.add('active');
    });

    currentStep = step;

    // Update progress bar and back button
    var progressBar = document.getElementById('progressBar');
    var progressFill = document.getElementById('progressFill');
    var backBtn = document.getElementById('backBtn');

    if (step === 0) {
      progressBar.style.display = 'none';
      backBtn.classList.remove('visible');
    } else if (step === 4) {
      progressFill.style.width = '100%';
      backBtn.classList.remove('visible');
      renderCompletion();
      setTimeout(spawnSparkles, 100);
    } else {
      progressBar.style.display = '';
      progressFill.style.width = (step / totalSteps * 100) + '%';
      backBtn.classList.add('visible');
    }
  }

  function goBack() {
    if (currentStep > 0) {
      goToStep(currentStep - 1);
    }
  }

  // ===== Selection Handlers =====
  function selectPill(field, el) {
    var group = el.parentElement;
    group.querySelectorAll('.pill-btn').forEach(function(b) { b.classList.remove('selected'); });
    el.classList.add('selected');
    state[field] = el.dataset.value;
    validateStep1();
  }

  function selectTone(el) {
    document.querySelectorAll('#toneGroup .tone-card').forEach(function(c) { c.classList.remove('selected'); });
    el.classList.add('selected');
    state.tone = el.dataset.value;
    validateStep2();
  }

  function selectChip(field, el) {
    var group = el.parentElement;
    group.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('selected'); });
    el.classList.add('selected');
    state[field] = el.dataset.value;
  }

  function toggleTag(el) {
    var maxTags = 3;
    if (el.classList.contains('disabled')) return;

    if (el.classList.contains('selected')) {
      el.classList.remove('selected');
      state.interests = state.interests.filter(function(v) { return v !== el.dataset.value; });
    } else {
      if (state.interests.length >= maxTags) return;
      el.classList.add('selected');
      state.interests.push(el.dataset.value);
    }

    // Update disabled state for unselected tags
    var tags = document.querySelectorAll('#interestsGroup .tag');
    tags.forEach(function(t) {
      if (!t.classList.contains('selected') && state.interests.length >= maxTags) {
        t.classList.add('disabled');
      } else {
        t.classList.remove('disabled');
      }
    });
  }

  function selectIconCard(el) {
    var group = el.parentElement;
    group.querySelectorAll('.icon-card').forEach(function(c) { c.classList.remove('selected'); });
    el.classList.add('selected');
    state.lifestyle = el.dataset.value;
  }

  // ===== Validation =====
  function validateStep1() {
    var nickname = document.getElementById('nicknameInput').value.trim();
    document.getElementById('step1Next').disabled = !nickname;
  }

  function validateStep2() {
    document.getElementById('step2Next').disabled = !state.tone;
  }

  document.getElementById('nicknameInput').addEventListener('input', validateStep1);

  // ===== Completion =====
  var toneLabels = {
    friendly: 'フレンドリー',
    polite: '丁寧',
    casual: 'カジュアル',
  };

  function renderCompletion() {
    var aiName = state.aiName || 'アイバ';
    document.getElementById('completionSubtitle').textContent =
      'あなたの相棒「' + aiName + '」が待っています';

    var summary = document.getElementById('completionSummary');
    var html = '';
    html += '<div class="summary-row"><span class="summary-label">ニックネーム</span><span class="summary-value">' + escHtml(state.nickname) + '</span></div>';
    html += '<div class="summary-row"><span class="summary-label">AI の名前</span><span class="summary-value">' + escHtml(aiName) + '</span></div>';
    html += '<div class="summary-row"><span class="summary-label">会話トーン</span><span class="summary-value">' + (toneLabels[state.tone] || '-') + '</span></div>';
    if (state.occupation) {
      html += '<div class="summary-row"><span class="summary-label">お仕事</span><span class="summary-value">' + escHtml(state.occupation) + '</span></div>';
    }
    if (state.interests.length > 0) {
      html += '<div class="summary-row"><span class="summary-label">興味</span><span class="summary-value">' + state.interests.map(escHtml).join('、') + '</span></div>';
    }
    if (state.lifestyle) {
      html += '<div class="summary-row"><span class="summary-label">ライフスタイル</span><span class="summary-value">' + escHtml(state.lifestyle) + '</span></div>';
    }
    summary.innerHTML = html;
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ===== Sparkles =====
  function spawnSparkles() {
    var container = document.getElementById('sparkleContainer');
    container.innerHTML = '';
    var colors = ['#3B82F6', '#60A5FA', '#93C5FD', '#BFDBFE', '#2563EB', '#818CF8', '#A78BFA'];
    for (var i = 0; i < 40; i++) {
      var sp = document.createElement('div');
      sp.className = 'sparkle';
      sp.style.left = '50%';
      sp.style.top = '30%';
      var angle = Math.random() * Math.PI * 2;
      var dist = 80 + Math.random() * 200;
      sp.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      sp.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      sp.style.setProperty('--delay', (100 + Math.random() * 500) + 'ms');
      sp.style.setProperty('--dur', (600 + Math.random() * 800) + 'ms');
      sp.style.background = colors[Math.floor(Math.random() * colors.length)];
      var size = 4 + Math.random() * 5;
      sp.style.width = size + 'px';
      sp.style.height = size + 'px';
      container.appendChild(sp);
      requestAnimationFrame(function() {
        this.classList.add('active');
      }.bind(sp));
    }
  }
</script>

</body>
</html>
