<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#26C6DA"/>
      <stop offset="100%" stop-color="#FFB830"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background full bleed (no rounded corners - iOS applies its own mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle highlight -->
  <rect width="512" height="256" fill="url(#glow)"/>

  <!-- Person head -->
  <circle cx="256" cy="155" r="54" fill="white"/>

  <!-- Person body -->
  <path d="
    M 172 262
    Q 172 232, 202 220
    L 240 208
    Q 256 204, 272 208
    L 310 220
    Q 340 232, 340 262
    L 340 318
    Q 340 336, 322 336
    L 190 336
    Q 172 336, 172 318
    Z
  " fill="white"/>

  <!-- Chat bubble accent (small) -->
  <g transform="translate(340, 100)">
    <rect x="0" y="0" width="72" height="52" rx="16" ry="16" fill="white" opacity="0.9"/>
    <polygon points="12,52 24,52 8,68" fill="white" opacity="0.9"/>
    <!-- Dots inside bubble -->
    <circle cx="22" cy="26" r="5" fill="#26C6DA"/>
    <circle cx="36" cy="26" r="5" fill="#7EC8A0"/>
    <circle cx="50" cy="26" r="5" fill="#FFB830"/>
  </g>

  <!-- Thin line separator above text -->
  <line x1="196" y1="378" x2="316" y2="378" stroke="white" stroke-width="2" opacity="0.4" stroke-linecap="round"/>

  <!-- AI text -->
  <text x="256" y="440" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="bold" fill="white" letter-spacing="12" opacity="0.95">AI</text>
</svg>
